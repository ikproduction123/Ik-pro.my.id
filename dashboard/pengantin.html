<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Data Pengantin</title>

<link rel="stylesheet" href="../css/dashboard.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body>

<div class="form-container">

<h1>Data Pengantin</h1>

<form id="pengantinForm">

<h3>Pengantin Pria</h3>

<input
type="text"
id="groomName"
placeholder="Nama Pengantin Pria">

<input
type="text"
id="groomFather"
placeholder="Nama Ayah">

<input
type="text"
id="groomMother"
placeholder="Nama Ibu">

<input
type="file"
id="groomPhoto">

<hr>

<h3>Pengantin Wanita</h3>

<input
type="text"
id="brideName"
placeholder="Nama Pengantin Wanita">

<input
type="text"
id="brideFather"
placeholder="Nama Ayah">

<input
type="text"
id="brideMother"
placeholder="Nama Ibu">

<input
type="file"
id="bridePhoto">

<hr>

<h3>Cover</h3>

<input
type="file"
id="coverPhoto">

<textarea
id="loveStory"
placeholder="Cerita Cinta">
</textarea>

<button type="submit">

Simpan Data

</button>

</form>

</div>

<script src="../js/supabase.js"></script>
<script src="../js/pengantin.js"></script>

</body>
</html>
