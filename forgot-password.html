<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - Undangan Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <a href="/" class="logo">
                        <span class="logo-icon">💍</span>
                        <span class="logo-text">Undangan<span class="logo-accent">Digital</span></span>
                    </a>
                    <h1>Lupa Password?</h1>
                    <p>Masukkan email Anda untuk menerima link reset password</p>
                </div>
                <form id="forgotForm">
                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <input type="email" id="email" class="form-input" placeholder="nama@email.com" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg" id="resetBtn">Kirim Link Reset</button>
                </form>
                <div class="auth-footer">
                    <a href="/login.html">← Kembali ke Login</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/utils.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('resetBtn');
            Utils.setLoading(btn, true);
            try {
                await Auth.forgotPassword(document.getElementById('email').value);
            } finally {
                Utils.setLoading(btn, false);
            }
        });
    </script>
</body>
</html>
