<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Register - IK-PRO</title>

<link rel="stylesheet"
href="css/auth.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

<div class="auth-container">

<div class="auth-card">

<h2>Daftar IK-PRO</h2>

<form id="registerForm">

<input
type="text"
id="fullname"
placeholder="Nama Lengkap"
required>

<input
type="email"
id="regEmail"
placeholder="Email"
required>

<input
type="password"
id="regPassword"
placeholder="Password"
required>

<button type="submit">
Daftar
</button>

</form>

<p>
Sudah punya akun?

<a href="login.html">
Login
</a>

</p>

</div>

</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
